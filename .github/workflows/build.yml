name: Build iOS App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    name: Build MusicSearch iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks

      - name: Show project info
        run: |
          cd ios
          xcodebuild -project MusicSearch.xcodeproj -list

      - name: Build (iOS Simulator)
        run: |
          cd ios
          xcodebuild \
            -project MusicSearch.xcodeproj \
            -scheme MusicSearch \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log
          retention-days: 7
